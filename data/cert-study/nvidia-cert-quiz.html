<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0f1a;--s:#131829;--s2:#1a2035;--bd:#252d44;--t:#e2e8f0;--td:#8892a8;--a:#76b900;--d1:#3b82f6;--d2:#8b5cf6;--d3:#f59e0b;--g:#22c55e;--r:#ef4444;--rad:8px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t);line-height:1.6;min-height:100vh}

.hdr{position:sticky;top:0;z-index:100;background:var(--s);border-bottom:1px solid var(--bd);padding:10px 16px;overflow:hidden}
.hdr-in{max-width:900px;margin:0 auto;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:8px}
.hdr h1{font-size:1rem;font-weight:700;color:var(--a);white-space:nowrap}

.stats{display:flex;flex-wrap:wrap;gap:8px;font-size:.78rem;font-weight:600}
.stat{padding:3px 10px;border-radius:20px;background:var(--s2);border:1px solid var(--bd);white-space:nowrap}
.sc{color:var(--a)}.sg{color:var(--g)}.sr{color:var(--r)}
.timer{font-variant-numeric:tabular-nums;color:var(--r)}

.tabs{max-width:900px;margin:12px auto 0;padding:0 16px;display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
.tabs::-webkit-scrollbar{height:4px}
.tabs::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.tab{padding:7px 14px;border-radius:var(--rad) var(--rad) 0 0;background:var(--s2);border:1px solid var(--bd);border-bottom:none;font-size:.72rem;font-weight:600;color:var(--td);cursor:pointer;white-space:nowrap;transition:.2s;flex-shrink:0}
.tab:hover{color:var(--t)}.tab.active{background:var(--s);color:var(--a);border-color:var(--a)}
.tab .badge{margin-left:5px;padding:1px 5px;border-radius:8px;font-size:.6rem;background:var(--bd);color:var(--td)}
.tab.active .badge{background:rgba(118,185,0,.3);color:var(--a)}
.tab-cheat{background:rgba(118,185,0,.1);border-color:rgba(118,185,0,.3);color:var(--a)}

.acts{max-width:900px;margin:10px auto;padding:0 16px;display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:7px 14px;border-radius:var(--rad);border:1px solid var(--bd);background:var(--s2);color:var(--t);font-size:.75rem;font-weight:600;cursor:pointer;transition:.2s}

.btn-a{background:var(--a);color:#000;border-color:var(--a)}
.btn-cheat{background:rgba(118,185,0,.15);color:var(--a);border-color:var(--a)}

.main{max-width:900px;margin:0 auto;padding:16px}
.panel{display:none}.panel.active{display:block}

/* Question card */
.qc{background:var(--s);border:1px solid var(--bd);border-radius:var(--rad);padding:20px;margin-bottom:12px;transition:.3s}
.qc.answered-correct{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.04)}
.qc.answered-wrong{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.04)}
.qc.flagged{border-left:3px solid var(--d3)}
.qnum{font-size:.7rem;color:var(--td);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.qunit{font-size:.6rem;padding:2px 6px;border-radius:4px;font-weight:600}
.qu1,.qu2,.qu3,.qu4,.qu5{background:rgba(59,130,246,.15);color:var(--d1)}
.qu6,.qu7,.qu8,.qu9,.qu10{background:rgba(139,92,246,.15);color:var(--d2)}
.qu11,.qu12,.qu13,.qu14{background:rgba(245,158,11,.15);color:var(--d3)}
.qtxt{font-size:.92rem;font-weight:600;margin-bottom:14px;line-height:1.5}
.opts{display:flex;flex-direction:column;gap:6px}
.opt{padding:10px 14px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);cursor:pointer;font-size:.82rem;transition:.2s;display:flex;gap:10px}
.opt:hover:not(.disabled){border-color:var(--a);background:rgba(118,185,0,.06)}
.opt.selected-correct{border-color:var(--g);background:rgba(34,197,94,.1)}
.opt.selected-wrong{border-color:var(--r);background:rgba(239,68,68,.1)}
.opt.show-correct{border-color:var(--g);background:rgba(34,197,94,.06)}
.opt.disabled{cursor:default;opacity:.8}
.opt-letter{font-weight:700;color:var(--td);min-width:18px}
.flag-btn{font-size:.65rem;padding:2px 8px;border-radius:4px;border:1px solid var(--bd);background:transparent;color:var(--td);cursor:pointer}
.flag-btn.flagged{background:rgba(245,158,11,.15);color:var(--d3);border-color:var(--d3)}

/* Cheat sheet */
.cs-section{margin-bottom:24px}
.cs-title{font-size:.85rem;font-weight:700;color:var(--a);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--bd)}
.cs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:8px}
.cs-card{background:var(--s);border:1px solid var(--bd);border-radius:6px;padding:12px}
.cs-card h4{font-size:.75rem;color:var(--a);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.cs-card p{font-size:.78rem;color:var(--td);line-height:1.5}

.prog-bar{height:4px;background:var(--bd);border-radius:2px;margin:8px 0;overflow:hidden}
.prog-fill{height:100%;background:var(--a);transition:.3s;border-radius:2px}

@media(max-width:600px){
  .hdr h1{font-size:.85rem}
  .stats{gap:4px;font-size:.7rem}
  .qtxt{font-size:.85rem}
  .opt{font-size:.78rem;padding:8px 10px}
  .cs-grid{grid-template-columns:1fr}
}
</style>

// ===== STATE =====
let order=[], answered={}, flagged=new Set(), correct=0, total=0, timerSec=3600, timerInt=null, currentTab='all';

// ===== INIT =====
function init(){
  order=Q.map((_,i)=>i);
  buildTabs();
  renderQuestions();
  startTimer();
}

function buildTabs(){
  const bar=document.getElementById('tabBar');
  const units=[...new Set(Q.map(q=>q.u))].sort((a,b)=>a-b);
  let html='<div class="tab active" onclick="switchTab(\'all\',this)">All<span class="badge">'+Q.length+'</span></div>';
  // Domain groupings
  html+='<div class="tab" onclick="switchTab(\'d1\',this)">D1: AI Knowledge<span class="badge">37</span></div>';
  html+='<div class="tab" onclick="switchTab(\'d2\',this)">D2: Infrastructure<span class="badge">40</span></div>';
  html+='<div class="tab" onclick="switchTab(\'d3\',this)">D3: Operations<span class="badge">23</span></div>';
  units.forEach(u=>{
    const cnt=Q.filter(q=>q.u===u).length;
    html+=`<div class="tab" onclick="switchTab(${u},this)">U${u}<span class="badge">${cnt}</span></div>`;
  });
  html+='<div class="tab tab-cheat" onclick="switchTab(\'cheat\',this)">Cheat Sheet</div>';
  bar.innerHTML=html;
}

function showCheat(){
  currentTab='cheat';
  document.querySelectorAll('.tab').forEach(t=>{t.classList.remove('active');if(t.textContent.includes('Cheat'))t.classList.add('active');});
  renderQuestions();
  window.scrollTo({top:0,behavior:'smooth'});
}

function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderQuestions();
}

function renderQuestions(){
  const area=document.getElementById('mainArea');
  if(currentTab==='cheat'){area.innerHTML=cheatSheet();return;}
  let indices;
  if(currentTab==='all') indices=order;
  else if(currentTab==='flagged') indices=order.filter(i=>flagged.has(i));
  else if(currentTab==='d1') indices=order.filter(i=>Q[i].u>=1&&Q[i].u<=5);
  else if(currentTab==='d2') indices=order.filter(i=>Q[i].u>=6&&Q[i].u<=10);
  else if(currentTab==='d3') indices=order.filter(i=>Q[i].u>=11&&Q[i].u<=14);
  else indices=order.filter(i=>Q[i].u===currentTab);
  let html='';
  indices.forEach((qi,idx)=>{
    const q=Q[qi];
    const ans=answered[qi];
    const isAnswered=ans!==undefined;
    const isFlagged=flagged.has(qi);
    let cls='qc';
    if(isAnswered) cls+=ans===q.c?' answered-correct':' answered-wrong';
    if(isFlagged) cls+=' flagged';
    html+=`<div class="${cls}" id="qc-${qi}">`;
    html+=`<div class="qnum"><span>Q${idx+1} of ${indices.length}</span><span class="qunit qu${q.u}">Unit ${q.u}</span>`;
    html+=`<button class="flag-btn ${isFlagged?'flagged':''}" onclick="toggleFlag(${qi},this)">Flag</button></div>`;
    html+=`<div class="qtxt">${q.q}</div><div class="opts">`;
    const letters=['A','B','C','D'];
    q.a.forEach((opt,oi)=>{
      let ocls='opt';
      if(isAnswered){
        ocls+=' disabled';
        if(oi===q.c) ocls+=' show-correct';
        if(oi===ans&&ans!==q.c) ocls+=' selected-wrong';
        if(oi===ans&&ans===q.c) ocls+=' selected-correct';
      }
      html+=`<div class="${ocls}" onclick="answer(${qi},${oi})"><span class="opt-letter">${letters[oi]}</span><span>${opt}</span></div>`;
    });
    html+=`</div></div>`;
  });
  if(!indices.length) html='<div style="text-align:center;padding:40px;color:var(--td)">No questions match this filter.</div>';
  area.innerHTML=html;
}

function answer(qi,oi){
  if(answered[qi]!==undefined) return;
  answered[qi]=oi;
  if(oi===Q[qi].c) correct++;
  total++;
  updateStats();
  renderQuestions();
  // scroll to next unanswered
  const card=document.getElementById('qc-'+qi);
  if(card&&card.nextElementSibling) card.nextElementSibling.scrollIntoView({behavior:'smooth',block:'center'});
}

function toggleFlag(qi,btn){
  if(flagged.has(qi)) flagged.delete(qi); else flagged.add(qi);
  document.getElementById('flagCount').textContent=flagged.size;
  renderQuestions();
}

function showFlagged(){
  currentTab='flagged';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  renderQuestions();
}

function updateStats(){
  document.getElementById('score').textContent=correct;
  document.getElementById('answered').textContent=total;
  document.getElementById('pct').textContent=total?Math.round(correct/total*100)+'%':'0%';
  document.getElementById('progFill').style.width=(total/Q.length*100)+'%';
}

function shuffleAll(){
  for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
  // also shuffle options for unanswered
  order.forEach(qi=>{
    if(answered[qi]===undefined){
      const q=Q[qi];
      const correctAns=q.a[q.c];
      for(let i=q.a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[q.a[i],q.a[j]]=[q.a[j],q.a[i]];}
      q.c=q.a.indexOf(correctAns);
    }
  });
  renderQuestions();
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetAll(){
  answered={};flagged.clear();correct=0;total=0;timerSec=3600;
  order=Q.map((_,i)=>i);
  updateStats();
  document.getElementById('flagCount').textContent='0';
  renderQuestions();
  window.scrollTo({top:0,behavior:'smooth'});
}

function gradeAll(){
  Q.forEach((q,qi)=>{if(answered[qi]===undefined){answered[qi]=-1;total++;}});
  updateStats();renderQuestions();
}

function startTimer(){
  timerInt=setInterval(()=>{
    if(timerSec<=0){clearInterval(timerInt);return;}
    timerSec--;
    const m=Math.floor(timerSec/60),s=timerSec%60;
    const el=document.getElementById('timer');
    el.textContent=m+':'+(s<10?'0':'')+s;
    if(timerSec<300) el.style.animation='pulse 1s infinite';
  },1000);
}
