 /><text fill="#fbbf24" font-family="Arial" font-size="7" font-weight="bold" text-anchor="middle" x="325" y="293.0">CB</text><line stroke="#fbbf24" stroke-width="1.5" x1="335" x2="380" y1="290.0" y2="290.0" /><text fill="#fbbf24" font-family="Arial" font-size="7" x="385" y="293.0">DC TO CONVERTER</text><rect fill="#111318" height="80" rx="4" stroke="#fbbf24" stroke-dasharray="6,3" stroke-width="1" width="300" x="100" y="525" /><text fill="#fbbf24" font-family="Arial" font-size="9" font-weight="bold" text-anchor="middle" x="250.0" y="540">ADDITIONAL PANELS</text><text fill="#fbbf24" font-family="Arial" font-size="8" x="115" y="557">~39 more panels on adjacent parcel</text><text fill="#9ca3af" font-family="Arial" font-size="7" x="115" y="570">Ground mount or carport structure</text><text fill="#9ca3af" font-family="Arial" font-size="7" x="115" y="583">0.60 acres total — ample space after blight demo</text><text fill="#fbbf24" font-family="Arial" font-size="9" font-weight="bold" x="115" y="597">TOTAL: ~55 panels = 300 kW</text><g><rect fill="#1a1a2e" height="55" rx="4" ry="4" stroke="#fbbf24" stroke-width="1.5" width="200" x="500" y="100" /><text fill="#fbbf24" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" x="600.0" y="120.0">STRING COMBINER</text><text fill="#fbbf24" font-family="Arial" font-size="9" font-weight="normal" text-anchor="middle" x="600.0" y="133.0">PANEL</text><text fill="#fbbf24" font-family="Arial" font-size="9" font-weight="normal" text-anchor="middle" x="600.0" y="146.0">~11 strings x 5 panels @ 952V</text><text fill="#6b7280" font-family="Arial" font-size="7" text-anchor="middle" x="600.0" y="151">Fused inputs | Monitoring</text></g><line stroke="#fbbf24" stroke-width="1.5" x1="600" x2="600" y1="155" y2="190" /><g><rect fill="#1a1a2e" height="55" rx="4" ry="4" stroke="#fbbf24" stroke-width="1.5" width="200" x="500" y="190" /><text fill="#fbbf24" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" x="600.0" y="210.0">DC-DC BUCK</text><text fill="#fbbf24" font-family="Arial" font-size="9" font-weight="normal" text-anchor="middle" x="600.0" y="223.0">CONVERTER</text><text fill="#fbbf24" font-family="Arial" font-size="9" font-weight="normal" text-anchor="middle" x="600.0" y="236.0">952V -&gt; 800V DC</text><text fill="#6b7280" font-family="Arial" font-size="7" text-anchor="middle" x="600.0" y="241">97% efficiency | MPPT tracking</text></g><line stroke="#8b5cf6" stroke-width="2" x1="600" x2="600" y1="245" y2="290" /><g><rect fill="#1a1a2e" height="45" rx="4" ry="4" stroke="#8b5cf6" stroke-width="1.5" width="200" x="500" y="290" /><text fill="#c4b5fd" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" x="600.0" y="311.5">800V DC BUS</text><text fill="#c4b5fd" font-family="Arial" font-size="9" font-weight="normal" text-anchor="middle" x="600.0" y="324.5">(DSX Reference)</text><text fill="#6b7280" font-family="Arial" font-size="7" text-anchor="middle" x="600.0" y="331">Feeds directly to GPU racks</text></g><line stroke="#3b82f6" stroke-width="1.5" x1="700" x2="740" y1="312" y2="312" /><g><rect fill="#1a1a2e" height="55" rx="4" ry="4" stroke="#3b82f6" stroke-width="1.5" width="170" x="740" y="285" /><text fill="#93c5fd" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" x="825.0" y="305.0">Eaton xStorage</text><text fill="#93c5fd" font-family="Arial" font-size="9" font-weight="normal" text-anchor="middle" x="825.0" y="318.0">BESS (600 kWh)</text><text fill="#93c5fd" font-family="Arial" font-size="9" font-weight="normal" text-anchor="middle" x="825.0" y="331.0">800V DC Native</text><text fill="#6b7280" font-family="Arial" font-size="7" text-anchor="middle" x="825.0" y="336">Ride-through + bridge + peak shave</text></g><rect fill="#111318" height="160" rx="6" stroke="#1e2230" width="580" x="500" y="380" /><text fill="#fbbf24" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" x="790" y="398">DC-DIRECT ARRAY MATH — MARLIE I ROOFTOP</text><text fill="#6b7280" font-family="Arial" font-size="8" x="520" y="415">Panel Model</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="675" y="415">First Solar Series 7 TR1</text><text fill="#6b7280" font-family="Arial" font-size="8" x="810" y="415">Rated Power</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="965" y="415">550W per panel</text><text fill="#6b7280" font-family="Arial" font-size="8" x="520" y="435">Vmp (max power voltage)</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="675" y="435">190.4V</text><text fill="#6b7280" font-family="Arial" font-size="8" x="810" y="435">Panels per String</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="965" y="435">5 (series) = 952V Vmp</text><text fill="#6b7280" font-family="Arial" font-size="8" x="520" y="455">Total Panels</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="675" y="455">~55</text><text fill="#6b7280" font-family="Arial" font-size="8" x="810" y="455">Total Strings</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="965" y="455">~11</text><text fill="#6b7280" font-family="Arial" font-size="8" x="520" y="475">Total Capacity</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="675" y="475">~300 kW (30.25 kW actual)</text><text fill="#6b7280" font-family="Arial" font-size="8" x="810" y="475">String Voltage</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="965" y="475">952V (5 x 190.4V Vmp)</text><text fill="#6b7280" font-family="Arial" font-size="8" x="520" y="495">Buck to Bus</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="675" y="495">952V -&gt; 800V DC</text><text fill="#6b7280" font-family="Arial" font-size="8" x="810" y="495">Path Efficiency</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="965" y="495">97% (vs 92% AC path)</text><text fill="#6b7280" font-family="Arial" font-size="8" x="520" y="515">Annual Production</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="675" y="515">~450 MWh (est)</text><text fill="#6b7280" font-family="Arial" font-size="8" x="810" y="515">IT Load Offset</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="965" y="515">~24% of 1,240 kW total</text><rect fill="#111318" height="140" rx="6" stroke="#1e2230" width="580" x="50" y="680" /><text fill="#fbbf24" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" x="340" y="698">FIRST SOLAR SERIES 7 TR1 — PANEL SPECIFICATIONS</text><text fill="#6b7280" font-family="Arial" font-size="8" x="70" y="715">Panel Model</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="215" y="715">First Solar Series 7 TR1</text><text fill="#6b7280" font-family="Arial" font-size="8" x="360" y="715">Rated Power</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="505" y="715">550W per panel</text><text fill="#6b7280" font-family="Arial" font-size="8" x="70" y="737">Efficiency</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="215" y="737">19.7% (CdTe thin-film)</text><text fill="#6b7280" font-family="Arial" font-size="8" x="360" y="737">Dimensions</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="505" y="737">~2.5m x 1.2m (8.2' x 3.9')</text><text fill="#6b7280" font-family="Arial" font-size="8" x="70" y="759">Degradation Rate</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="215" y="759">0.3%/year (industry best)</text><text fill="#6b7280" font-family="Arial" font-size="8" x="360" y="759">Warranty</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="505" y="759">30-year manufacturer</text><text fill="#6b7280" font-family="Arial" font-size="8" x="70" y="781">Manufacturing</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="215" y="781">New Iberia, LA ($1.1B factory)</text><text fill="#6b7280" font-family="Arial" font-size="8" x="360" y="781">Distance to Site</text><text fill="#fbbf24" font-family="Arial" font-size="8" font-weight="bold" x="505" y="781">~30 miles</text><rect fill="#111318" height="55" rx="6" stroke="#1e2230" width="700" x="660" y="680" /><text fill="#fbbf24" font-family="Arial" font-size="9" font-weight="bold" x="675" y="698">DC-DIRECT (OUR DESIGN):</text><text fill="#fbbf24" font-family="Arial" font-size="8" x="675" y="712">Panel (190V) -&gt; String (952V) -&gt; Buck (800V) -&gt; DSX Bus -&gt; Rack -&gt; LLC -&gt; GPU</text><text fill="#76b900" font-family="Arial" font-size="9" font-weight="bold" x="675" y="725">97% efficiency</text><text fill="#555" font-family="Arial" font-size="9" font-weight="bold" x="1040" y="698">TRADITIONAL AC:</text><text fill="#555" font-family="Arial" font-size="8" x="1040" y="712">Panel -&gt; Inverter -&gt; Transformer -&gt; UPS -&gt; PDU -&gt; PSU -&gt; GPU</text><text fill="#ef4444" font-family="Arial" font-size="9" font-weight="bold" x="1040" y="725">88-92% efficiency</text><rect fill="#111318" height="60" rx="6" stroke="#1e2230" width="700" x="660" y="750" /><text fill="#3b82f6" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" x="1010" y="768">Eaton xStorage BESS (600 kWh) — 800V DC NATIVE</text><text fill="#6b7280" font-family="Arial" font-size="7" font-weight="bold" x="680" y="788">Capacity</text><text fill="#3b82f6" font-family="Arial" font-size="9" font-weight="bold" x="680" y="800">600 kWh</text><text fill="#6b7280" font-family="Arial" font-size="7" font-weight="bold" x="820" y="788">Voltage</text><text fill="#3b82f6" font-family="Arial" font-size="9" font-weight="bold" x="820" y="800">800V DC Native</text><text fill="#6b7280" font-family="Arial" font-size="7" font-weight="bold" x="960" y="788">Function</text><text fill="#3b82f6" font-family="Arial" font-size="9" font-weight="bold" x="960" y="800">Ride-through</text><text fill="#6b7280" font-family="Arial" font-size="7" font-weight="bold" x="1100" y="788">Duration</text><text fill="#3b82f6" font-family="Arial" font-size="9" font-weight="bold" x="1100" y="800">~30 min at full load</text><text fill="#6b7280" font-family="Arial" font-size="7" font-weight="bold" x="1240" y="788">Peak Shaving</text><text fill="#3b82f6" font-family="Arial" font-size="9" font-weight="bold" x="1240" y="800">Yes</text><text fill="#4b5563" font-family="Arial" font-size="7" x="35" y="840">1. 24x40 roof = 960 sq ft. ~55 First Solar TR1 panels needed for 300 kW — roof fits ~14, rest on ground mount (adjacent parcel).</text><text fill="#4b5563" font-family="Arial" font-size="7" x="35" y="853">2. 0.60 acres across 3 parcels — ample ground space after Phase 1 blight demolition for remaining panel installation.</text><text fill="#4b5563" font-family="Arial" font-size="7" x="35" y="866">3. DC-Direct path: 952V strings buck-converted to 800V for direct feed into DSX bus — 97% efficiency, no AC conversion.</text><text fill="#4b5563" font-family="Arial" font-size="7" x="35" y="879">4. 600 kWh BESS on 800V DC bus provides ~30 minutes of ride-through at full 1,240 kW facility load.</text><text fill="#4b5563" font-family="Arial" font-size="7" x="35" y="892">5. Annual production ~450 MWh estimated. Offsets ~24% of total facility electrical consumption.</text><text fill="#4b5563" font-family="Arial" font-size="7" x="35" y="905">6. Made in America: First Solar manufactured in New Iberia, LA — 30 miles from MARLIE I site.</text><text fill="#4b5563" font-family="Arial" font-size="7" x="35" y="918">7. Small scale compared to Trappeys (300 kW vs 2.05 MW) but meaningful offset for a 1,920 sq ft building.</text><text fill="#4b5563" font-family="Arial" font-size="7" x="35" y="931">8. Solar is Layer 1 (offset), not primary. Gas generators carry full load 24/7. Solar reduces gas consumption.</text></svg>