er tower)</text><line stroke="#ff6b6b" stroke-width="2" x1="420" x2="434" y1="558" y2="558" /><text fill="#9ca3af" font-family="Arial" font-size="8" x="440" y="561">Return Pipe (Hot — to dry coolers)</text><line stroke="#8b5cf6" stroke-width="2" x1="420" x2="434" y1="572" y2="572" /><text fill="#9ca3af" font-family="Arial" font-size="8" x="440" y="575">Cable Tray (overhead 800V DC busway)</text><line stroke="#5a3a1a" stroke-width="2" x1="420" x2="434" y1="586" y2="586" /><text fill="#9ca3af" font-family="Arial" font-size="8" x="440" y="589">Wooden Trusses (existing structure)</text><text fill="#6b7280" font-family="Arial" font-size="8" font-weight="bold" x="710" y="502">BUILDING</text><text fill="#CE181E" font-family="Arial" font-size="9" font-weight="bold" x="810" y="502">300' x 75'</text><text fill="#CE181E" font-family="Arial" font-size="9" font-weight="bold" x="810" y="513">22,500 sq ft</text><text fill="#6b7280" font-family="Arial" font-size="8" font-weight="bold" x="710" y="528">PHASE 1 RACKS</text><text fill="#CE181E" font-family="Arial" font-size="9" font-weight="bold" x="810" y="528">4x NVL72</text><text fill="#CE181E" font-family="Arial" font-size="9" font-weight="bold" x="810" y="539">520 kW IT</text><text fill="#6b7280" font-family="Arial" font-size="8" font-weight="bold" x="710" y="554">GPUs</text><text fill="#CE181E" font-family="Arial" font-size="9" font-weight="bold" x="810" y="554">288 total</text><text fill="#CE181E" font-family="Arial" font-size="9" font-weight="bold" x="810" y="565">72 per rack</text><text fill="#6b7280" font-family="Arial" font-size="8" font-weight="bold" x="710" y="580">COOLING</text><text fill="#CE181E" font-family="Arial" font-size="9" font-weight="bold" x="810" y="580">Water Tower</text><text fill="#CE181E" font-family="Arial" font-size="9" font-weight="bold" x="810" y="591">+ Dry Coolers</text><text fill="#4b5563" font-family="Arial" font-size="7.5" x="35" y="800">1. Middle High building: 300' x 75' = 22,500 sq ft — existing wooden truss structure, highest ceiling clearance</text><text fill="#4b5563" font-family="Arial" font-size="7.5" x="35" y="813">2. Phase 1 deploys 4x NVL72 racks in hot/cold aisle containment — 130 kW each, 520 kW total IT load</text><text fill="#4b5563" font-family="Arial" font-size="7.5" x="35" y="826">3. CDU area houses coolant distribution units with N+1 redundancy — pipes run to/from water tower via dry coolers</text><text fill="#4b5563" font-family="Arial" font-size="7.5" x="35" y="839">4. 800V DC busway runs overhead via cable tray from electrical room to each rack position</text><text fill="#4b5563" font-family="Arial" font-size="7.5" x="35" y="852">5. Loading access from Rear High building (37,500 sf staging area) — forklifts, crates, rack delivery</text><text fill="#4b5563" font-family="Arial" font-size="7.5" x="35" y="865">6. Wooden trusses are original Trappeys Cannery construction — structural assessment required before rack loading</text><text fill="#4b5563" font-family="Arial" font-size="7.5" x="35" y="878">7. Reinforced slab required at rack positions: NVL72 ~2,500 lbs loaded, ~250 lb/sq ft concentrated</text><text fill="#4b5563" font-family="Arial" font-size="7.5" x="35" y="891">8. Phase 2 expansion into Middle Low building (300' x 100' = 30,000 sf) adds up to 32 more racks</text><text fill="#4b5563" font-family="Arial" font-size="7.5" x="35" y="904">9. Fire suppression: clean agent (Novec 1230) in compute area, wet pipe in support spaces</text></svg>