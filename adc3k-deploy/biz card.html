<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Scott Tomsu — ADC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#000;font-family:'Inter',system-ui,sans-serif}

/* ── starfield canvas ── */
canvas#stars{position:fixed;inset:0;z-index:0}

/* ── horizon glow ── */
.horizon{position:fixed;bottom:0;left:0;right:0;height:220px;z-index:1;
  background:radial-gradient(ellipse 120% 100% at 50% 100%,
    rgba(30,80,180,0.25) 0%,
    rgba(20,50,120,0.12) 30%,
    rgba(10,20,60,0.05) 60%,
    transparent 100%);
  pointer-events:none}
.horizon::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 5%,rgba(80,140,255,0.4) 30%,rgba(120,180,255,0.6) 50%,rgba(80,140,255,0.4) 70%,transparent 95%)}
.horizon::after{content:'';position:absolute;bottom:2px;left:0;right:0;height:40px;
  background:linear-gradient(to top,rgba(20,40,80,0.3),transparent);pointer-events:none}

/* ── card container ── */
.card{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;padding:40px 24px 60px;text-align:center}

/* ── logo ── */
.logo{width:72px;height:72px;border-radius:50%;border:2px solid rgba(120,180,255,0.3);
  object-fit:cover;opacity:0;animation:fadeUp .8s ease .3s forwards;
  box-shadow:0 0 30px rgba(60,120,220,0.2)}

/* ── name ── */
.name{font-size:32px;font-weight:700;letter-spacing:2px;margin-top:28px;
  color:#fff;opacity:0;animation:fadeUp .8s ease .6s forwards}
.name-glow{position:relative}
.name-glow::after{content:'';position:absolute;inset:-4px -12px;
  background:linear-gradient(90deg,transparent,rgba(120,180,255,0.08),transparent);
  border-radius:8px;animation:shimmer 4s ease-in-out infinite}

/* ── title ── */
.title{font-size:14px;font-weight:400;letter-spacing:3px;text-transform:uppercase;
  color:rgba(160,200,255,0.7);margin-top:8px;opacity:0;animation:fadeUp .8s ease .9s forwards}

/* ── divider ── */
.divider{width:60px;height:1px;margin:28px auto;opacity:0;animation:fadeUp .8s ease 1.1s forwards;
  background:linear-gradient(90deg,transparent,rgba(120,180,255,0.5),transparent)}

/* ── contact details ── */
.details{display:flex;flex-direction:column;gap:12px;opacity:0;animation:fadeUp .8s ease 1.3s forwards}
.detail{display:flex;align-items:center;gap:10px;justify-content:center;
  font-size:14px;color:rgba(220,230,255,0.85);letter-spacing:0.5px;text-decoration:none;transition:color .2s}
a.detail:hover{color:#fff}
.detail svg{width:16px;height:16px;flex-shrink:0;opacity:0.5}

/* ── buttons ── */
.buttons{display:flex;gap:16px;margin-top:36px;opacity:0;animation:fadeUp .8s ease 1.6s forwards;flex-wrap:wrap;justify-content:center}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:8px;
  font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;
  text-decoration:none;transition:all .25s ease;border:none;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,rgba(40,90,200,0.9),rgba(60,120,220,0.9));
  color:#fff;box-shadow:0 4px 20px rgba(40,90,200,0.3)}
.btn-primary:hover{box-shadow:0 4px 30px rgba(40,90,200,0.5);transform:translateY(-1px)}
.btn-secondary{background:rgba(255,255,255,0.06);color:rgba(200,220,255,0.9);
  border:1px solid rgba(120,180,255,0.2)}
.btn-secondary:hover{background:rgba(255,255,255,0.1);border-color:rgba(120,180,255,0.4)}
.btn svg{width:15px;height:15px}

/* ── tagline ── */
.tagline{font-size:11px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(120,160,220,0.4);margin-top:36px;opacity:0;animation:fadeUp .8s ease 1.9s forwards}

/* ── animations ── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes shimmer{
  0%,100%{opacity:0}
  50%{opacity:1}
}

/* ── mobile tweaks ── */
@media(max-height:640px){
  .logo{width:56px;height:56px}
  .name{font-size:26px;margin-top:20px}
  .divider{margin:20px auto}
  .buttons{margin-top:24px}
  .tagline{margin-top:20px}
}
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="horizon"></div>

<div class="card">
  <img class="logo" src="adc-logo.jpg" alt="ADC">

  <div class="name-glow">
    <div class="name">SCOTT TOMSU</div>
  </div>
  <div class="title">Founder &mdash; Advantage Design Construction Inc.</div>

  <div class="divider"></div>

  <div class="details">
    <a class="detail" href="tel:+13377801535">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 01 1.02-.24 11.72 11.72 0 003.66.58 1 1 0 011 1v3.56a1 1 0 01-1 1A17 17 0 013 4.91a1 1 0 011-1h3.59a1 1 0 011 1c0 1.28.21 2.5.58 3.66a1 1 0 01-.25 1.02l-2.3 2.2z"/></svg>
      337-780-1535
    </a>
    <a class="detail" href="mailto:scott@adc3k.com">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4l-10 8L2 4"/></svg>
      scott@adc3k.com
    </a>
    <a class="detail" href="https://adc3k.com" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10A15.3 15.3 0 0112 2z"/></svg>
      adc3k.com
    </a>
    <span class="detail">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Lafayette, Louisiana
    </span>
  </div>

  <div class="buttons">
    <button class="btn btn-primary" onclick="saveContact()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save Contact
    </button>
    <a class="btn btn-secondary" href="https://adc3k.com" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      View Portfolio
    </a>
  </div>

  <div class="tagline">Louisiana's Neocloud &bull; AI Infrastructure &bull; Edge Compute</div>
</div>

<script>
/* ── twinkling starfield ── */
(function(){
  const c=document.getElementById('stars'),x=c.getContext('2d');
  let w,h,stars=[];
  function resize(){w=c.width=innerWidth;h=c.height=innerHeight;init()}
  function init(){
    stars=[];
    const n=Math.floor(w*h/3000);
    for(let i=0;i<n;i++){
      stars.push({
        x:Math.random()*w,
        y:Math.random()*h,
        r:Math.random()*1.2+0.3,
        base:Math.random()*0.5+0.3,
        amp:Math.random()*0.4+0.1,
        speed:Math.random()*0.002+0.001,
        phase:Math.random()*Math.PI*2
      })
    }
  }
  function draw(t){
    x.clearRect(0,0,w,h);
    for(const s of stars){
      const a=s.base+Math.sin(t*s.speed+s.phase)*s.amp;
      x.beginPath();
      x.arc(s.x,s.y,s.r,0,Math.PI*2);
      x.fillStyle=`rgba(200,220,255,${a})`;
      x.fill()
    }
    requestAnimationFrame(draw)
  }
  addEventListener('resize',resize);
  resize();
  requestAnimationFrame(draw)
})();

/* ── vCard download ── */
function saveContact(){
  const vcard=[
    'BEGIN:VCARD',
    'VERSION:3.0',
    'FN:Scott Tomsu',
    'N:Tomsu;Scott;;;',
    'ORG:Advantage Design Construction Inc.',
    'TITLE:Founder',
    'TEL;TYPE=CELL:+13377801535',
    'EMAIL:scott@adc3k.com',
    'URL:https://adc3k.com',
    'ADR;TYPE=WORK:;;1201 SE Evangeline Thruway;Lafayette;LA;;US',
    'NOTE:AI Infrastructure | Edge Compute | Autonomous Systems',
    'END:VCARD'
  ].join('\r\n');
  const blob=new Blob([vcard],{type:'text/vcard'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='Scott_Tomsu_ADC.vcf';
  a.click();
  URL.revokeObjectURL(a.href)
}
</script>
</body>
</html>
