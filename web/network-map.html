<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Louisiana AI Infrastructure Network — Mission Control</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #070b14;
      color: #e2e8f0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    #header {
      background: #0d1526;
      border-bottom: 1px solid #1e3a5f;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
      flex-shrink: 0;
    }

    #header .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #header .logo-dot {
      width: 10px; height: 10px;
      background: #00ff88;
      border-radius: 50%;
      box-shadow: 0 0 8px #00ff88;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px #00ff88; }
      50% { opacity: 0.6; box-shadow: 0 0 20px #00ff88; }
    }

    #header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #f1f5f9;
      letter-spacing: 0.5px;
    }

    #header .subtitle {
      font-size: 11px;
      color: #4a9eff;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #header .stats-bar {
      display: flex;
      gap: 24px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-item .val {
      font-size: 20px;
      font-weight: 700;
      color: #00ff88;
      line-height: 1;
    }

    .stat-item .lbl {
      font-size: 9px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 2px;
    }

    .view-toggle {
      display: flex;
      gap: 4px;
      background: #111827;
      border: 1px solid #1e3a5f;
      border-radius: 6px;
      padding: 3px;
    }

    .view-btn {
      background: none;
      border: none;
      color: #64748b;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .view-btn.active {
      background: #1e3a5f;
      color: #4a9eff;
    }

    /* ── MAP ── */
    #map-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Dark map tiles get further darkened */
    .leaflet-tile-pane { filter: brightness(0.85) contrast(1.1) saturate(0.8); }

    /* ── CUSTOM MARKERS ── */
    .node-marker {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .node-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid;
      animation: ring-pulse 2.5s ease-out infinite;
      opacity: 0;
    }

    @keyframes ring-pulse {
      0% { transform: scale(0.8); opacity: 0.8; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    .node-core {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      position: relative;
      z-index: 2;
      box-shadow: 0 0 12px currentColor;
      cursor: pointer;
    }

    .node-hq .node-core     { background: #00ff88; color: #00ff88; width: 22px; height: 22px; box-shadow: 0 0 20px #00ff88; }
    .node-hq .node-ring     { border-color: #00ff88; width: 22px; height: 22px; }
    .node-active .node-core { background: #ffd700; color: #ffd700; }
    .node-active .node-ring { border-color: #ffd700; width: 18px; height: 18px; }
    .node-planned .node-core { background: #4a9eff; color: #4a9eff; }
    .node-planned .node-ring { border-color: #4a9eff; width: 18px; height: 18px; }
    .node-partner .node-core { background: #a855f7; color: #a855f7; }
    .node-partner .node-ring { border-color: #a855f7; width: 18px; height: 18px; }
    .node-concept .node-core { background: #94a3b8; color: #94a3b8; opacity: 0.7; }
    .node-concept .node-ring { border-color: #94a3b8; width: 18px; height: 18px; }

    .node-label {
      position: absolute;
      top: 26px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 10px;
      font-weight: 600;
      color: #f1f5f9;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.9);
      pointer-events: none;
      letter-spacing: 0.3px;
    }

    .node-label .node-sub {
      display: block;
      font-size: 9px;
      font-weight: 400;
      color: #94a3b8;
      text-align: center;
    }

    /* ── SIDE PANEL ── */
    #side-panel {
      position: absolute;
      top: 0; right: -420px;
      width: 400px;
      height: 100%;
      background: rgba(10, 18, 35, 0.97);
      border-left: 1px solid #1e3a5f;
      z-index: 900;
      transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
      backdrop-filter: blur(8px);
    }

    #side-panel.open { right: 0; }

    #panel-close {
      position: absolute;
      top: 14px; right: 14px;
      background: #1e3a5f;
      border: none;
      color: #94a3b8;
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    #panel-close:hover { background: #2d4f7c; color: #f1f5f9; }

    #panel-content {
      padding: 24px 20px 40px;
    }

    .panel-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 14px;
    }

    .badge-hq       { background: rgba(0,255,136,0.12); color: #00ff88; border: 1px solid rgba(0,255,136,0.3); }
    .badge-active   { background: rgba(255,215,0,0.12);  color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }
    .badge-planned  { background: rgba(74,158,255,0.12); color: #4a9eff; border: 1px solid rgba(74,158,255,0.3); }
    .badge-partner  { background: rgba(168,85,247,0.12); color: #a855f7; border: 1px solid rgba(168,85,247,0.3); }
    .badge-concept  { background: rgba(148,163,184,0.12);color: #94a3b8; border: 1px solid rgba(148,163,184,0.3); }

    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    #panel-content h2 {
      font-size: 20px;
      font-weight: 700;
      color: #f8fafc;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    #panel-content .panel-location {
      font-size: 12px;
      color: #4a9eff;
      margin-bottom: 16px;
    }

    .panel-divider {
      height: 1px;
      background: #1e3a5f;
      margin: 16px 0;
    }

    .panel-section-title {
      font-size: 10px;
      color: #4a9eff;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    #panel-content p {
      font-size: 13px;
      color: #cbd5e1;
      line-height: 1.7;
      margin-bottom: 10px;
    }

    .spec-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .spec-item {
      background: #111827;
      border: 1px solid #1e3a5f;
      border-radius: 6px;
      padding: 10px;
    }

    .spec-item .spec-val {
      font-size: 15px;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1;
      margin-bottom: 3px;
    }

    .spec-item .spec-lbl {
      font-size: 9px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .service-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .service-tag {
      background: #0f172a;
      border: 1px solid #1e3a5f;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 11px;
      color: #94a3b8;
    }

    .connections-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .conn-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #94a3b8;
    }

    .conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── LEGEND ── */
    #legend {
      position: absolute;
      bottom: 20px;
      left: 16px;
      background: rgba(10, 18, 35, 0.92);
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 12px 14px;
      z-index: 800;
      backdrop-filter: blur(8px);
    }

    .legend-title {
      font-size: 9px;
      color: #4a9eff;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 5px;
    }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── COMMUNITY LAYER TOGGLE ── */
    #layer-controls {
      position: absolute;
      bottom: 20px;
      right: 16px;
      z-index: 800;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .layer-btn {
      background: rgba(10, 18, 35, 0.92);
      border: 1px solid #1e3a5f;
      border-radius: 6px;
      padding: 7px 12px;
      color: #64748b;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
      white-space: nowrap;
      text-align: left;
    }

    .layer-btn.on { border-color: #4a9eff; color: #4a9eff; background: rgba(74,158,255,0.1); }

    /* ── TOOLTIP ── */
    .leaflet-tooltip {
      background: rgba(10, 18, 35, 0.95) !important;
      border: 1px solid #1e3a5f !important;
      color: #f1f5f9 !important;
      font-size: 12px !important;
      border-radius: 6px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
    }

    .leaflet-tooltip::before { border-top-color: #1e3a5f !important; }

    /* Scrollbar */
    #side-panel::-webkit-scrollbar { width: 4px; }
    #side-panel::-webkit-scrollbar-track { background: #0d1526; }
    #side-panel::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }

    /* Leaflet attribution */
    .leaflet-control-attribution {
      background: rgba(7,11,20,0.8) !important;
      color: #475569 !important;
      font-size: 9px !important;
    }
    .leaflet-control-attribution a { color: #4a9eff !important; }
  </style>
</head>

  <!-- LAYER CONTROLS -->

</div>

      { val: 'ADC 3K', lbl: 'Compute' },
      { val: 'DC Fast', lbl: 'EV Charging' },
      { val: 'Urban Core', lbl: 'Visibility' },
    ],
    services: ['Urban AI Compute', 'EV Fast Charging', 'Community Hub', 'Public Demonstration'],
    connects: [{ name: 'MARLIE 1 NOC', color: '#00ff88' }],
  },
  {
    id: 'newiberia',
    name: 'New Iberia Solar Factory',
    subtitle: 'Energy Partner — Site 2 Candidate',
    location: 'New Iberia, Iberia Parish, Louisiana',
    lat: 30.03768, lng: -91.87524,
    type: 'partner',
    statusLabel: 'Partner',
    badgeClass: 'badge-partner',
    public: {
      headline: 'Renewable Energy Partner',
      description: 'The New Iberia Solar Factory is ~30 miles southeast of Lafayette and represents both a key energy supply partner and a potential second ADC 3K deployment site. Solar power from this facility feeds directly into the network\'s sustainability goals.',
      what_it_does: 'Provides renewable energy supply to the network and serves as a candidate for ADC 3K pod deployment, extending compute capacity into Iberia Parish.',
    },
    tech: {
      role: 'Renewable energy supplier + Site 2 ADC candidate',
      distance: '~30 miles from MARLIE 1',
      energy: 'Solar generation — feeds network sustainability targets',
    },
    specs: [
      { val: '~30 mi', lbl: 'From MARLIE 1' },
      { val: 'Solar', lbl: 'Energy Type' },
      { val: 'Site 2', lbl: 'ADC Candidate' },
      { val: 'Partner', lbl: 'Status' },
    ],
    services: ['Renewable Energy Supply', 'ADC 3K Deployment Site', 'Carbon Offset'],
    connects: [{ name: 'MARLIE 1 — Energy Feed', color: '#00ff88' }],
  },
];

const COMMUNITY_NODES = [
  { name: 'Lafayette General Hospital', lat: 30.2240, lng: -92.0175, icon: '🏥', service: 'AI diagnostics, emergency data, KLFT medical drone delivery' },
  { name: 'Lafayette Parish Sheriff', lat: 30.2155, lng: -92.0196, icon: '🚔', service: 'KLFT DFR, AI dispatch optimization, situational awareness' },
  { name: 'Lafayette Fire Dept HQ', lat: 30.2180, lng: -92.0250, icon: '🚒', service: 'KLFT aerial recon, AI incident command, dispatch routing' },
  { name: 'Lafayette Consolidated Govt', lat: 30.2230, lng: -92.0218, icon: '🏛', service: 'Smart city AI, infrastructure monitoring, permitting AI' },
  { name: 'UL Lafayette', lat: 30.2127, lng: -92.0196, icon: '🎓', service: 'AI research compute, student training, innovation pipeline' },
];

const ENERGY_NODES = [
  { name: 'LUS Fiber (Primary Grid)', lat: 30.210, lng: -92.032, icon: '⚡', note: 'Dual feed available — LUS + SLEMCO' },
  { name: 'Henry Hub Gas Corridor', lat: 29.95, lng: -91.60, icon: '🔥', note: '40 miles from MARLIE 1 — lowest gas cost in US' },
  { name: 'Bloom Energy Fuel Cell', lat: 30.185, lng: -92.026, icon: '⚗', note: 'Continuous baseload ~300kW per unit, stackable' },
];

// ── MAP INIT ──────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [30.15, -91.97],
  zoom: 10,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

// ── STATE ─────────────────────────────────────────────────────────────
let currentView = 'public';
let connectionsVisible = true;
let communityVisible = false;
let energyVisible = false;
let connectionLines = [];
let communityMarkers = [];
let energyMarkers = [];
let nodeMarkers = {};

// ── DRAW NODE MARKERS ─────────────────────────────────────────────────
function createNodeIcon(type) {
  return L.divIcon({
    className: '',
    html: `<div class="node-marker node-${type}">
             <div class="node-ring"></div>
             <div class="node-core"></div>
           </div>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12],
  });
}

NODES.forEach(node => {
  const icon = createNodeIcon(node.type);
  const marker = L.marker([node.lat, node.lng], { icon, zIndexOffset: node.type === 'hq' ? 1000 : 0 });

  marker.bindTooltip(`<strong>${node.name}</strong><br><span style="color:#94a3b8;font-size:10px">${node.subtitle}</span>`, {
    permanent: false, direction: 'top', offset: [0, -14],
  });

  marker.on('click', () => openPanel(node));
  marker.addTo(map);
  nodeMarkers[node.id] = marker;

  // Label
  L.marker([node.lat, node.lng], {
    icon: L.divIcon({
      className: '',
      html: `<div class="node-label">${node.name}<span class="node-sub">${node.subtitle}</span></div>`,
      iconSize: [160, 40],
      iconAnchor: [80, -8],
    }),
    interactive: false,
    zIndexOffset: -100,
  }).addTo(map);
});

// ── DRAW CONNECTIONS ──────────────────────────────────────────────────
const CONNECTION_PAIRS = [
  ['marlie', 'trappeys', '#00ff88', 2.5],
  ['marlie', 'klft', '#ffd700', 2],
  ['marlie', 'coteau', '#4a9eff', 1.5],
  ['marlie', 'airport', '#94a3b8', 1.5],
  ['marlie', 'pinhook', '#94a3b8', 1.5],
  ['marlie', 'newiberia', '#a855f7', 1.5],
  ['klft', 'airport', '#ffd700', 1.5],
];

function drawConnections() {
  connectionLines.forEach(l => map.removeLayer(l));
  connectionLines = [];
  if (!connectionsVisible) return;

  CONNECTION_PAIRS.forEach(([a, b, color, weight]) => {
    const na = NODES.find(n => n.id === a);
    const nb = NODES.find(n => n.id === b);
    if (!na || !nb) return;

    const line = L.polyline([[na.lat, na.lng], [nb.lat, nb.lng]], {
      color,
      weight,
      opacity: 0.5,
      dashArray: color === '#94a3b8' ? '6, 6' : null,
      smoothFactor: 1,
    });
    line.addTo(map);
    connectionLines.push(line);
  });
}

drawConnections();

// ── COMMUNITY LAYER ───────────────────────────────────────────────────
function drawCommunity() {
  communityMarkers.forEach(m => map.removeLayer(m));
  communityMarkers = [];
  if (!communityVisible) return;

  COMMUNITY_NODES.forEach(cn => {
    const icon = L.divIcon({
      className: '',
      html: `<div style="font-size:20px;filter:drop-shadow(0 0 4px rgba(249,115,22,0.8))">${cn.icon}</div>`,
      iconSize: [28, 28], iconAnchor: [14, 14],
    });
    const m = L.marker([cn.lat, cn.lng], { icon });
    m.bindTooltip(`<strong>${cn.name}</strong><br><span style="color:#94a3b8;font-size:10px">${cn.service}</span>`, {
      permanent: false, direction: 'top', offset: [0, -14],
    });
    m.addTo(map);
    communityMarkers.push(m);

    // Line to MARLIE 1
    const marlie = NODES.find(n => n.id === 'marlie');
    const line = L.polyline([[cn.lat, cn.lng], [marlie.lat, marlie.lng]], {
      color: '#f97316', weight: 1, opacity: 0.3, dashArray: '4, 8',
    });
    line.addTo(map);
    communityMarkers.push(line);
  });
}

// ── ENERGY LAYER ──────────────────────────────────────────────────────
function drawEnergy() {
  energyMarkers.forEach(m => map.removeLayer(m));
  energyMarkers = [];
  if (!energyVisible) return;

  ENERGY_NODES.forEach(en => {
    const icon = L.divIcon({
      className: '',
      html: `<div style="font-size:18px;filter:drop-shadow(0 0 4px rgba(250,204,21,0.8))">${en.icon}</div>`,
      iconSize: [24, 24], iconAnchor: [12, 12],
    });
    const m = L.marker([en.lat, en.lng], { icon });
    m.bindTooltip(`<strong>${en.name}</strong><br><span style="color:#94a3b8;font-size:10px">${en.note}</span>`, {
      permanent: false, direction: 'top', offset: [0, -14],
    });
    m.addTo(map);
    energyMarkers.push(m);
  });
}

// ── PANEL ─────────────────────────────────────────────────────────────
function openPanel(node) {
  const isTech = currentView === 'tech';
  const info = isTech ? node.tech : node.public;

  let specsHTML = '';
  if (node.specs) {
    specsHTML = `<div class="spec-grid">${node.specs.map(s =>
      `<div class="spec-item"><div class="spec-val">${s.val}</div><div class="spec-lbl">${s.lbl}</div></div>`
    ).join('')}</div>`;
  }

  let techDetailHTML = '';
  if (isTech && node.tech) {
    techDetailHTML = `<div class="panel-section-title">Technical Specs</div>`;
    Object.entries(node.tech).forEach(([k, v]) => {
      const label = k.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
      techDetailHTML += `<p><strong style="color:#4a9eff">${label}:</strong> ${v}</p>`;
    });
    techDetailHTML += '<div class="panel-divider"></div>';
  }

  const connectsHTML = node.connects ? `
    <div class="panel-section-title">Network Connections</div>
    <div class="connections-list">
      ${node.connects.map(c => `
        <div class="conn-item">
          <div class="conn-dot" style="background:${c.color}"></div>
          ${c.name}
        </div>`).join('')}
    </div>` : '';

  const servicesHTML = node.services ? `
    <div class="panel-divider"></div>
    <div class="panel-section-title">Services &amp; Use Cases</div>
    <div class="service-tags">
      ${node.services.map(s => `<span class="service-tag">${s}</span>`).join('')}
    </div>` : '';

  document.getElementById('panel-content').innerHTML = `
    <div class="panel-status-badge ${node.badgeClass}">
      <div class="badge-dot"></div>${node.statusLabel}
    </div>
    <h2>${node.name}</h2>
    <div class="panel-location">${node.location}</div>
    <div class="panel-divider"></div>

    ${!isTech ? `
      <div class="panel-section-title">What This Is</div>
      <p><strong style="color:#f1f5f9">${node.public.headline}</strong></p>
      <p>${node.public.description}</p>
      <p>${node.public.what_it_does}</p>
      <div class="panel-divider"></div>
    ` : ''}

    ${specsHTML}
    ${techDetailHTML}
    ${connectsHTML}
    ${servicesHTML}
  `;

  document.getElementById('side-panel').classList.add('open');
}

function closePanel() {
  document.getElementById('side-panel').classList.remove('open');
}

// ── VIEW TOGGLE ───────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('btn-public').classList.toggle('active', v === 'public');
  document.getElementById('btn-tech').classList.toggle('active', v === 'tech');
}

// ── LAYER TOGGLES ─────────────────────────────────────────────────────
function toggleConnections() {
  connectionsVisible = !connectionsVisible;
  document.getElementById('btn-connections').classList.toggle('on', connectionsVisible);
  drawConnections();
}

function toggleCommunity() {
  communityVisible = !communityVisible;
  document.getElementById('btn-community').classList.toggle('on', communityVisible);
  drawCommunity();
}

function toggleEnergy() {
  energyVisible = !energyVisible;
  document.getElementById('btn-energy').classList.toggle('on', energyVisible);
  drawEnergy();
}

// ── OPTIONAL: Mission Control SSE ─────────────────────────────────────
// If Mission Control server is running on port 8000, connect and update status
(function trySSE() {
  try {
    const es = new EventSource('http://localhost:8000/events');
    es.onopen = () => {
      document.getElementById('stat-status').textContent = 'LIVE';
      document.getElementById('stat-status').style.color = '#00ff88';
    };
    es.onerror = () => {
      es.close();
    };
  } catch(e) {}
})();

// Click map background to close panel
map.on('click', () => closePanel());
</script>
</body>
</html>
